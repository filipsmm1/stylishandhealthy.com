<form action="https://formspree.io/f/xgodvqwl" method="POST" class="contact-form-wrap">

  <div class="form-field">
    <label class="form-label" for="name">Full Name</label>
    <input
      class="form-input"
      type="text"
      id="name"
      name="name"
      placeholder="Your full name"
      required
    >
  </div>

  <div class="form-field">
    <label class="form-label" for="email">Email Address</label>
    <input
      class="form-input"
      type="email"
      id="email"
      name="email"
      placeholder="your@email.com"
      required
    >
  </div>

  <div class="form-field">
    <label class="form-label" for="subject">Subject</label>
    <select
      class="form-input"
      id="subject"
      name="subject"
      required
    >
      <option value="">Choose a subject</option>
      <option>Paid Promotion</option>
      <option>Sponsorship</option>
      <option>Product Recommendation</option>
      <option>Complaint</option>
      <option>Website Problem</option>
      <option>Question About a Product</option>
      <option>Request Full PDF Literature</option>
      <option>Other</option>
    </select>
  </div>

  <div class="form-field">
    <label class="form-label" for="message">Message</label>
    <textarea
      class="form-textarea"
      id="message"
      name="message"
      placeholder="Write your message here..."
      required
    ></textarea>
  </div>

  <input
    type="hidden"
    name="_subject"
    value="New Stylishandhealthy Contact Form Submission"
  >

  <button
    type="submit"
    class="btn btn-f"
    style="width:100%; margin-top:10px;"
  >
    Send Message
  </button>

</form>
